services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: n8n
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: n8n
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 5s
      timeout: 5s
      retries: 20

  n8n:
    build:
      context: .
      dockerfile: Dockerfile
    image: n8n-fork-local:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678
      GENERIC_TIMEZONE: America/Sao_Paulo
      N8N_DIAGNOSTICS_ENABLED: "false"

      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: n8n

      # Troque em produção
      N8N_ENCRYPTION_KEY: "troque-esta-chave-em-producao"

      # Para carregar nodes externos locais:
      # N8N_CUSTOM_EXTENSIONS: /home/node/custom
    volumes:
      - n8n_data:/home/node/.n8n
      # Descomente para montar seus custom nodes:
      # - ./custom-nodes:/home/node/custom

volumes:
  postgres_data:
  n8n_data:
